<!DOCTYPE html>
<!--
  SCREEN: Invite Accepted — auto-accept landing after clicking an invite link (Dana, invited agent).
  Confirmation state: success check + "You've joined Kitaab Alyom" with a toast variant,
  and a subtle "Not you? Decline" secondary link for the wrong-recipient case.

  WHATATALK TEAL PALETTE
  LIGHT: bg #E6F2EE / surface #FFFFFF / ink #0F172A / muted #64748B / border #E2E8F0
         border-strong #94A3B8 / primary #0F766E / primary-hover #115E54 / on-primary #FFFFFF
         success #16A34A
  DARK : bg #0B1A17 / surface #11221E / ink #E6EDEB / muted #94A3B8 / border #1F3A34
         primary #0F766E / focus-ring #2DD4BF
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WhataTalk — You've joined Kitaab Alyom</title>
<style>
  :root{
    --bg:#E6F2EE; --surface:#FFFFFF; --ink:#0F172A; --muted:#64748B;
    --border:#E2E8F0; --border-strong:#94A3B8; --primary:#0F766E; --primary-hover:#115E54;
    --on-primary:#FFFFFF; --success:#16A34A; --focus-ring:#2DD4BF;
  }
  .dark{
    --bg:#0B1A17; --surface:#11221E; --ink:#E6EDEB; --muted:#94A3B8;
    --border:#1F3A34; --border-strong:#2A4A43; --primary:#0F766E; --success:#34D399; --focus-ring:#2DD4BF;
  }
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:40px 16px;}
  .caption{position:fixed;top:0;left:0;right:0;background:#0F172A;color:#CBD5E1;font-size:12px;
    padding:8px 14px;text-align:center;letter-spacing:.2px;}
  .wrap{width:100%;max-width:400px;}
  .brand{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:22px;}
  .mark{width:30px;height:18px;position:relative;}
  .mark::before,.mark::after{content:"";position:absolute;top:0;width:18px;height:18px;
    border:4px solid var(--primary);border-radius:50%;}
  .mark::before{left:0;} .mark::after{right:0;}
  .wordmark{font-size:20px;font-weight:700;letter-spacing:-.3px;}
  .wordmark .t{color:var(--primary);}

  /* success toast */
  .toast{display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--success);border-left:4px solid var(--success);border-radius:12px;
    padding:12px 14px;margin-bottom:18px;box-shadow:0 6px 18px rgba(15,23,42,.08);}
  .toast .tcheck{flex:0 0 22px;width:22px;height:22px;border-radius:50%;background:var(--success);
    color:#fff;display:flex;align-items:center;justify-content:center;}
  .toast .tcheck svg{width:14px;height:14px;}
  .toast .ttxt{font-size:14px;font-weight:500;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:34px 28px 28px;box-shadow:0 10px 30px rgba(15,23,42,.06);text-align:center;}
  .check{width:64px;height:64px;border-radius:50%;background:rgba(22,163,74,.12);
    display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
  .check svg{width:34px;height:34px;color:var(--success);}
  .title{font-size:24px;font-weight:600;margin:0 0 6px;}
  .body{font-size:15px;color:var(--muted);margin:0 0 8px;line-height:1.45;}
  .body strong{color:var(--ink);}

  .acct{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);
    border-radius:999px;padding:6px 14px 6px 6px;margin:6px 0 22px;}
  .acct .av{width:30px;height:30px;border-radius:50%;background:#0F766E;color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .acct .an{font-size:14px;font-weight:600;}
  .acct .ar{font-size:12px;color:var(--muted);}

  .btn{width:100%;height:46px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;
    background:var(--primary);color:var(--on-primary);border:1px solid var(--primary);}
  .btn:hover{background:var(--primary-hover);}
  .decline{margin-top:16px;}
  .decline a{color:var(--muted);font-size:13px;text-decoration:none;}
  .decline a:hover{color:var(--ink);text-decoration:underline;}
</style>
</head>
<body>
<div class="caption">screen-invite-accepted · Invite auto-accept landing — joined confirmation + toast (Dana journey)</div>
<div class="wrap">
  <div class="brand"><span class="mark"></span><span class="wordmark">Whata<span class="t">Talk</span></span></div>

  <!-- toast variant -->
  <div class="toast">
    <span class="tcheck"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>
    <span class="ttxt">Priya invited you to join Kitaab Alyom</span>
  </div>

  <div class="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="title">You’re in</h1>
    <p class="body">You’ve joined <strong>Kitaab Alyom</strong> as an Agent. Your invite was accepted automatically.</p>

    <div class="acct">
      <span class="av">KA</span>
      <span><span class="an">Kitaab Alyom</span> · <span class="ar">Roles: AGENT</span></span>
    </div>

    <button class="btn" type="button">Go to account</button>

    <div class="decline"><a href="#">Not you? Decline</a></div>
  </div>
</div>
</body>
</html>
