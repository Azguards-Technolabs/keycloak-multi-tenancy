<!DOCTYPE html>
<!--
  SCREEN: Welcome back (method chooser for a known email)
  JOURNEY/STATE: Sam — returning user whose email is recognized. Offers passkey first,
  then magic link, then password. No social sign-in.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Welcome back</title>
<style>
/*
  PALETTE — Direction "Trust & Clarity"
  LIGHT: bg #F8FAFC | surface #FFFFFF | ink #0F172A | muted #64748B | border #E2E8F0
         primary #2563EB | primary-hover #1D4ED8 | danger #DC2626 | danger-bg #FEF2F2 | success #16A34A
  DARK:  bg #0B1220 | surface #111A2E | ink #E6EDF7 | muted #94A3B8 | border #1F2A44 | primary #3B82F6
  Radius: field 10 | card 12 | card-lg 16 | pill 999. Heights 46. Card max 400.
*/
:root{
  --bg:#F8FAFC; --surface:#FFFFFF; --ink:#0F172A; --muted:#64748B; --border:#E2E8F0;
  --primary:#2563EB; --primary-hover:#1D4ED8; --danger:#DC2626; --danger-bg:#FEF2F2; --success:#16A34A;
  --grad-a:#3B82F6; --grad-b:#2563EB;
}
.dark{
  --bg:#0B1220; --surface:#111A2E; --ink:#E6EDF7; --muted:#94A3B8; --border:#1F2A44;
  --primary:#3B82F6; --primary-hover:#2563EB;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;}
.caption-top{max-width:760px;margin:18px auto 0;padding:0 20px;color:var(--muted);font-size:13px;line-height:1.5;}
.stage{min-height:78vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;box-shadow:0 8px 24px rgba(15,23,42,.06);padding:36px 32px 30px;}
.brand{width:48px;height:48px;border-radius:12px;margin:0 auto 20px;
  background:linear-gradient(135deg,var(--grad-a),var(--grad-b));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;
  box-shadow:0 4px 12px rgba(37,99,235,.28);}
h1{font-size:24px;font-weight:600;margin:0 0 18px;text-align:center;letter-spacing:-.2px;}
.emailchip{display:flex;align-items:center;justify-content:space-between;gap:10px;
  border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:18px;background:var(--bg);}
.emailchip .who{display:flex;align-items:center;gap:10px;min-width:0;}
.avatar{width:26px;height:26px;border-radius:8px;background:#7C3AED;color:#fff;font-size:12px;font-weight:600;
  display:flex;align-items:center;justify-content:center;flex:none;}
.emailchip .addr{font-size:14px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.change{color:var(--primary);font-size:13px;font-weight:500;text-decoration:none;flex:none;}
.change:hover{text-decoration:underline;}
.method{display:flex;align-items:center;gap:13px;width:100%;border:1px solid var(--border);background:var(--surface);
  border-radius:12px;padding:13px 14px;margin-top:10px;cursor:pointer;text-align:left;color:var(--ink);}
.method:hover{border-color:var(--primary);}
.method.primary{border-color:var(--primary);background:rgba(37,99,235,.04);}
.glyph{width:38px;height:38px;border-radius:10px;flex:none;display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--primary);}
.method.primary .glyph{background:var(--primary);color:#fff;}
.glyph svg{width:20px;height:20px;}
.m-txt{flex:1;min-width:0;}
.m-title{font-size:15px;font-weight:600;line-height:1.3;}
.m-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.chev{color:var(--muted);flex:none;}
.chev svg{width:18px;height:18px;}
.rec{display:inline-block;font-size:11px;font-weight:600;color:var(--primary);
  background:rgba(37,99,235,.1);border-radius:999px;padding:1px 8px;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body>
  <p class="caption-top"><strong>Screen 2 — Welcome back (method chooser).</strong> Serves Sam, a returning user with a recognized email. Passkey is the recommended primary; magic link and password follow.</p>
  <div class="stage">
    <main>
      <div class="card">
        <div class="brand">A</div>
        <h1>Welcome back</h1>

        <div class="emailchip">
          <span class="who">
            <span class="avatar">S</span>
            <span class="addr">sam@northwind.co</span>
          </span>
          <a class="change" href="#">Change</a>
        </div>

        <button class="method primary">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="9" r="3.5"/><path d="M11 9h9l-2 2 2 2-3 3"/></svg>
          </span>
          <span class="m-txt">
            <span class="m-title">Use your passkey<span class="rec">Recommended</span></span>
            <span class="m-sub">Sign in with Face ID, fingerprint, or device PIN</span>
          </span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </button>

        <button class="method">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          </span>
          <span class="m-txt">
            <span class="m-title">Email me a magic link</span>
            <span class="m-sub">We'll send a one-time sign-in link</span>
          </span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </button>

        <button class="method">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
          </span>
          <span class="m-txt">
            <span class="m-title">Use password instead</span>
            <span class="m-sub">Sign in with your account password</span>
          </span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
        </button>
      </div>
    </main>
  </div>
</body>
</html>
